<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<script>
function generateIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const ps = Math.max(1, Math.floor(size / 16)); // pixel size

  function p(x, y, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x * ps, y * ps, ps, ps);
  }

  // Background
  ctx.fillStyle = '#2D1B69';
  ctx.fillRect(0, 0, size, size);

  // Border
  ctx.strokeStyle = '#00D9FF';
  ctx.lineWidth = Math.max(1, ps / 2);
  ctx.strokeRect(0, 0, size, size);

  // Cat face
  const c = {
    body: '#F4A460',
    bodyDark: '#CD853F',
    bodyLight: '#FFDEAD',
    eyes: '#2E8B57',
    nose: '#FF69B4'
  };

  // Ears
  p(4, 2, c.body); p(5, 2, c.body);
  p(10, 2, c.body); p(11, 2, c.body);
  p(4, 3, c.body); p(5, 3, c.bodyLight);
  p(10, 3, c.bodyLight); p(11, 3, c.body);

  // Head
  for (let x = 3; x <= 12; x++) {
    p(x, 4, c.body);
    p(x, 5, c.body);
    p(x, 6, c.body);
  }
  for (let x = 4; x <= 11; x++) {
    p(x, 7, c.body);
  }

  // Eyes
  p(5, 5, c.eyes); p(6, 5, '#1A5C3E');
  p(9, 5, c.eyes); p(10, 5, '#1A5C3E');

  // Nose
  p(7, 6, c.nose); p(8, 6, c.nose);

  // Mouth
  p(6, 7, c.bodyDark); p(7, 7, c.bodyDark); p(8, 7, c.bodyDark); p(9, 7, c.bodyDark);

  // Body
  for (let x = 4; x <= 11; x++) {
    p(x, 8, c.body);
    p(x, 9, c.body);
    p(x, 10, c.body);
  }
  // Belly
  for (let x = 5; x <= 10; x++) {
    p(x, 9, c.bodyLight);
    p(x, 10, c.bodyLight);
  }

  // Paws
  p(4, 11, c.bodyDark); p(5, 11, c.bodyDark);
  p(10, 11, c.bodyDark); p(11, 11, c.bodyDark);

  // Tail
  p(12, 7, c.body); p(13, 6, c.body);

  // Text "PP" for larger icons
  if (size >= 48) {
    ctx.fillStyle = '#BFFF00';
    ctx.font = `bold ${Math.floor(size/6)}px "Courier New", monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('PP', size/2, size - ps * 1);
  }

  return canvas;
}

// Generate and download all sizes
[16, 48, 128].forEach(size => {
  const canvas = generateIcon(size);
  const link = document.createElement('a');
  link.download = `icon-${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

document.body.innerHTML = '<h1>Icons generated! Check downloads.</h1>';
</script>
</body>
</html>
